<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Dashboard - MyMatchPlayPal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

  <!-- Top Nav -->
  <nav class="top-nav">
    <a href="golfer.html" class="top-nav-brand">
      <div class="icon" id="nav-logo"><img src="logo.png" alt="MyMatchPlayPal"></div>
      <span>MyMatchPlayPal</span>
    </a>
    <div class="top-nav-links"></div>
    <div class="top-nav-actions">
      <div class="avatar" id="nav-avatar">--</div>
      <button class="signout-btn" onclick="signOut()">Sign Out</button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="page">

    <!-- Greeting -->
    <div class="page-header">
      <h1 id="greeting">Dashboard</h1>
      <p>Your matchplay overview</p>
    </div>

    <!-- Stats -->
    <div class="stat-cards">
      <div class="stat-card">
        <div class="stat-icon green">
          <svg width="22" height="22" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
        </div>
        <div class="stat-text">
          <div class="stat-value" id="s-tournaments">-</div>
          <div class="stat-label">Tournaments</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon gold">
          <svg width="22" height="22" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/></svg>
        </div>
        <div class="stat-text">
          <div class="stat-value" id="s-matches">-</div>
          <div class="stat-label">To Play</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue">
          <svg width="22" height="22" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd"/></svg>
        </div>
        <div class="stat-text">
          <div class="stat-value" id="s-record">-</div>
          <div class="stat-label">W-L Record</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon purple">
          <svg width="22" height="22" viewBox="0 0 20 20" fill="currentColor"><path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"/><path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z"/></svg>
        </div>
        <div class="stat-text">
          <div class="stat-value" id="s-streak">-</div>
          <div class="stat-label">Win Streak</div>
        </div>
      </div>
    </div>

    <!-- My Matches -->
    <div class="card">
      <div class="card-head">
        <h2>My Matches</h2>
      </div>
      <div class="card-body" id="matches-list">
        <div class="card-empty">Loading...</div>
      </div>
    </div>

    <!-- My Tournaments -->
    <div class="card">
      <div class="card-head">
        <h2>My Tournaments</h2>
      </div>
      <div class="card-body" id="my-tournaments">
        <div class="card-empty">Loading...</div>
      </div>
    </div>

    <!-- Report Score -->
    <div class="card">
      <div class="card-head">
        <h2>Report Score</h2>
      </div>
      <div class="card-body">
        <div class="form-group">
          <label class="form-label">Select Match</label>
          <select class="form-select" id="score-match-select">
            <option disabled selected>Loading...</option>
          </select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
          <div class="form-group">
            <label class="form-label">Result</label>
            <select class="form-select" id="score-result">
              <option value="won">I Won</option>
              <option value="lost">I Lost</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Score</label>
            <input type="text" class="form-input" id="score-value" placeholder="e.g. 3&2">
          </div>
        </div>
        <button class="btn btn-primary btn-block" onclick="submitScore()">Submit Score</button>
      </div>
    </div>

    <!-- Enter Tournaments -->
    <div class="card">
      <div class="card-head">
        <h2>Enter Tournaments</h2>
      </div>
      <div class="card-body" id="open-tournaments">
        <div class="card-empty">Loading...</div>
      </div>
    </div>

  </div>

  <!-- View Bracket Modal -->
  <div class="modal-overlay" id="bracketModal">
    <div class="modal" style="max-width:95%;width:900px;">
      <div class="modal-header">
        <h3 id="bracketModalTitle">Bracket</h3>
        <button class="modal-close" onclick="document.getElementById('bracketModal').classList.remove('active')">&times;</button>
      </div>
      <div class="modal-body" style="overflow-x:auto;">
        <div id="bracketModalContent"><div class="card-empty">Loading...</div></div>
      </div>
    </div>
  </div>

  <!-- View Entrants Modal -->
  <div class="modal-overlay" id="entrantsModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="entrantsModalTitle">Entrants</h3>
        <button class="modal-close" onclick="document.getElementById('entrantsModal').classList.remove('active')">&times;</button>
      </div>
      <div class="modal-body">
        <div id="entrantsModalContent"><div class="card-empty">Loading...</div></div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav" id="bottom-nav"></nav>

  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/draw-engine.js"></script>
  <script src="js/golfer.js"></script>
  <script>
    setRole('golfer');
    document.addEventListener('DOMContentLoaded', function() {
      renderBottomNav('home');
      renderTopNavLinks('home');
      checkAndOfferOrgSwitch();
    });
  </script>
</body>
</html>
