<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Dashboard - MyMatchPlayPal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

  <!-- Top Nav -->
  <nav class="top-nav">
    <a href="golfer.html" class="top-nav-brand">
      <div class="icon" id="nav-logo">&#9971;</div>
      <span>MyMatchPlayPal</span>
    </a>
    <div class="top-nav-links"></div>
    <div class="top-nav-actions">
      <div class="avatar" id="nav-avatar">--</div>
      <button class="signout-btn" onclick="signOut()">Sign Out</button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="page">

    <!-- Greeting -->
    <div class="page-header">
      <h1 id="greeting">Dashboard</h1>
      <p>Your matchplay overview</p>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-box">
        <div class="value" id="s-tournaments">-</div>
        <div class="label">Tournaments</div>
      </div>
      <div class="stat-box">
        <div class="value" id="s-matches">-</div>
        <div class="label">To Play</div>
      </div>
      <div class="stat-box">
        <div class="value" id="s-record">-</div>
        <div class="label">W-L</div>
      </div>
      <div class="stat-box">
        <div class="value" id="s-streak">-</div>
        <div class="label">Streak</div>
      </div>
    </div>

    <!-- My Matches -->
    <div class="card">
      <div class="card-head">
        <h2>My Matches</h2>
      </div>
      <div class="card-body" id="matches-list">
        <div class="card-empty">Loading...</div>
      </div>
    </div>

    <!-- My Tournaments -->
    <div class="card">
      <div class="card-head">
        <h2>My Tournaments</h2>
      </div>
      <div class="card-body" id="my-tournaments">
        <div class="card-empty">Loading...</div>
      </div>
    </div>

    <!-- Enter Competitions -->
    <div class="card">
      <div class="card-head">
        <h2>Enter Competitions</h2>
      </div>
      <div class="card-body" id="open-tournaments">
        <div class="card-empty">Loading...</div>
      </div>
    </div>

    <!-- Report Score -->
    <div class="card">
      <div class="card-head">
        <h2>Report Score</h2>
      </div>
      <div class="card-body">
        <div class="form-group">
          <label class="form-label">Select Match</label>
          <select class="form-select" id="score-match-select">
            <option disabled selected>Loading...</option>
          </select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
          <div class="form-group">
            <label class="form-label">Result</label>
            <select class="form-select" id="score-result">
              <option value="won">I Won</option>
              <option value="lost">I Lost</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Score</label>
            <input type="text" class="form-input" id="score-value" placeholder="e.g. 3&2">
          </div>
        </div>
        <button class="btn btn-primary btn-block" onclick="submitScore()">Submit Score</button>
      </div>
    </div>

  </div>

  <!-- View Bracket Modal -->
  <div class="modal-overlay" id="bracketModal">
    <div class="modal" style="max-width:95%;width:900px;">
      <div class="modal-header">
        <h3 id="bracketModalTitle">Bracket</h3>
        <button class="modal-close" onclick="document.getElementById('bracketModal').classList.remove('active')">&times;</button>
      </div>
      <div class="modal-body" style="overflow-x:auto;">
        <div id="bracketModalContent"><div class="card-empty">Loading...</div></div>
      </div>
    </div>
  </div>

  <!-- View Entrants Modal -->
  <div class="modal-overlay" id="entrantsModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="entrantsModalTitle">Entrants</h3>
        <button class="modal-close" onclick="document.getElementById('entrantsModal').classList.remove('active')">&times;</button>
      </div>
      <div class="modal-body">
        <div id="entrantsModalContent"><div class="card-empty">Loading...</div></div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav" id="bottom-nav"></nav>

  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/draw-engine.js"></script>
  <script src="js/golfer.js"></script>
  <script>
    setRole('golfer');
    renderBottomNav('home');
    renderTopNavLinks('home');
    document.addEventListener('DOMContentLoaded', checkAndOfferOrgSwitch);
  </script>
</body>
</html>
