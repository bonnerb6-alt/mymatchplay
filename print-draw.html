<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Print Draw - MyMatchPlayPal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    /* ---- Print page specific ---- */
    .tournament-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .draw-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .draw-card-info h3 { font-size: 1rem; font-weight: 600; color: var(--gray-900); margin-bottom: 0.2rem; }
    .draw-card-info p  { font-size: 0.78rem; color: var(--gray-500); }
    .draw-card-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    /* ---- Print preview overlay ---- */
    #printPreview {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
      overflow-y: auto;
      padding: 2rem 1rem;
    }
    #printPreview .preview-inner {
      background: white;
      max-width: 860px;
      margin: 0 auto;
      border-radius: var(--radius);
      padding: 2rem;
    }
    #printPreview .preview-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--gray-200);
    }

    /* ---- Print sheet content ---- */
    .print-header { text-align: center; margin-bottom: 2rem; }
    .print-header h1 { font-size: 1.6rem; font-weight: 700; margin: 0.5rem 0 0.25rem; }
    .print-header p  { font-size: 0.85rem; color: #555; }
    .print-header img { width: 70px; height: 70px; object-fit: contain; margin: 0 auto 0.75rem; }

    .print-section-title {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--gray-700);
      margin: 1.5rem 0 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 2px solid var(--gray-200);
    }

    .print-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .print-table th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      background: var(--gray-100);
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--gray-600);
    }
    .print-table td { padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--gray-100); color: var(--gray-800); }
    .print-table tr:last-child td { border-bottom: none; }
    .print-table .round-row td {
      background: var(--green-50);
      color: var(--green-800);
      font-weight: 700;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.4rem 0.75rem;
    }

    .print-footer { text-align: center; margin-top: 2rem; font-size: 0.75rem; color: #999; }

    /* ---- Actual @media print ---- */
    @media print {
      #printPreview { display: block !important; position: static; background: none; padding: 0; }
      #printPreview .preview-inner { box-shadow: none; border-radius: 0; padding: 15mm; }
      #printPreview .preview-actions { display: none !important; }
      body > *:not(#printPreview) { display: none !important; }
    }
  </style>
</head>
<body>

  <nav class="top-nav organiser">
    <a href="organiser.html" class="top-nav-brand">
      <div class="icon"><img src="logo.png" alt="MyMatchPlayPal"></div>
      <span>MyMatchPlayPal <span class="role-tag organiser">Organiser</span></span>
    </a>
    <div class="top-nav-links"></div>
    <div class="top-nav-actions">
      <a href="organiser.html" class="btn btn-sm btn-secondary" style="color:var(--white);border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.12);">Back to Dashboard</a>
    </div>
  </nav>

  <div class="page" style="max-width:860px;">
    <div class="page-header">
      <h1>Print Draw</h1>
      <p>Select a tournament to print its draw sheet or player list.</p>
    </div>

    <div class="tournament-list" id="tournament-list">
      <div class="card-empty">Loading tournaments...</div>
    </div>
  </div>

  <!-- Print Preview Overlay -->
  <div id="printPreview">
    <div class="preview-inner">
      <div class="preview-actions">
        <button class="btn btn-secondary" onclick="closePreview()">Close</button>
        <button class="btn btn-primary" onclick="window.print()">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor" style="display:inline;vertical-align:middle;margin-right:0.3rem;"><path fill-rule="evenodd" d="M5 4v3H4a2 2 0 00-2 2v3a2 2 0 002 2h1v2a1 1 0 001 1h8a1 1 0 001-1v-2h1a2 2 0 002-2V9a2 2 0 00-2-2h-1V4a1 1 0 00-1-1H6a1 1 0 00-1 1zm2 0h6v3H7V4zm-1 9h8v2H6v-2z" clip-rule="evenodd"/></svg>
          Print
        </button>
      </div>
      <div id="printContent"></div>
    </div>
  </div>

  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script>
    var organiser = null;
    var orgClubId = null;

    async function init() {
      setRole('organiser');
      organiser = await getCurrentMember();
      if (!organiser) { window.location.href = 'login.html'; return; }

      // Get organiser's club — check club_memberships first
      var { data: memberships } = await supabase
        .from('club_memberships')
        .select('club_id, clubs(id, name, logo_url)')
        .eq('member_id', organiser.id)
        .eq('role', 'organiser');

      var savedClubId = sessionStorage.getItem('orgSelectedClub');
      if (memberships && memberships.length > 0) {
        var saved = savedClubId ? memberships.find(function(m) { return m.club_id === savedClubId; }) : null;
        var club = saved || memberships[0];
        orgClubId = club.club_id;
        organiser._clubName = club.clubs?.name || 'Golf Club';
        organiser._clubLogo = club.clubs?.logo_url || null;
      } else {
        orgClubId = organiser.club_id;
        organiser._clubName = organiser.clubs?.name || 'Golf Club';
        organiser._clubLogo = null;
      }

      loadTournaments();
    }

    async function loadTournaments() {
      var container = document.getElementById('tournament-list');

      var { data: tournaments } = await supabase
        .from('tournaments')
        .select('id, name, status, bracket_size, entry_deadline')
        .eq('club_id', orgClubId)
        .in('status', ['in_progress', 'completed', 'entries_open'])
        .order('created_at', { ascending: false });

      if (!tournaments || tournaments.length === 0) {
        container.innerHTML = '<div class="card-empty">No tournaments found for this club.</div>';
        return;
      }

      var statusLabel = { in_progress: 'Live', completed: 'Completed', entries_open: 'Open' };
      var statusColor = { in_progress: 'badge-green', completed: 'badge-gray', entries_open: 'badge-gold' };

      container.innerHTML = tournaments.map(function(t) {
        return '<div class="draw-card">' +
          '<div class="draw-card-info">' +
            '<h3>' + t.name + '</h3>' +
            '<p>' + t.bracket_size + ' players &bull; <span class="badge ' + (statusColor[t.status] || 'badge-gray') + '" style="font-size:0.65rem;">' + (statusLabel[t.status] || t.status) + '</span></p>' +
          '</div>' +
          '<div class="draw-card-actions">' +
            '<button class="btn btn-sm btn-primary" onclick="showDraw(\'' + t.id + '\',\'' + t.name.replace(/'/g, "\\'") + '\')">' +
              '<svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor" style="display:inline;vertical-align:middle;margin-right:0.25rem;"><path fill-rule="evenodd" d="M5 4v3H4a2 2 0 00-2 2v3a2 2 0 002 2h1v2a1 1 0 001 1h8a1 1 0 001-1v-2h1a2 2 0 002-2V9a2 2 0 00-2-2h-1V4a1 1 0 00-1-1H6a1 1 0 00-1 1zm2 0h6v3H7V4zm-1 9h8v2H6v-2z" clip-rule="evenodd"/></svg>' +
              'Print Draw' +
            '</button>' +
            '<button class="btn btn-sm btn-secondary" onclick="showNameList(\'' + t.id + '\',\'' + t.name.replace(/'/g, "\\'") + '\')">' +
              '<svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor" style="display:inline;vertical-align:middle;margin-right:0.25rem;"><path fill-rule="evenodd" d="M3 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>' +
              'Name List' +
            '</button>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    async function showDraw(tournamentId, name) {
      document.getElementById('printContent').innerHTML = '<p style="text-align:center;padding:2rem;color:#999;">Loading draw...</p>';
      document.getElementById('printPreview').style.display = 'block';
      document.body.style.overflow = 'hidden';

      var [matchesRes, tRes] = await Promise.all([
        supabase.from('matches')
          .select('*, player1:members!matches_player1_id_fkey(first_name, last_name), player2:members!matches_player2_id_fkey(first_name, last_name), winner:members!matches_winner_id_fkey(first_name, last_name)')
          .eq('tournament_id', tournamentId)
          .order('round').order('position'),
        supabase.from('tournaments').select('bracket_size').eq('id', tournamentId).single()
      ]);

      var matches = matchesRes.data || [];
      var bracketSize = tRes.data?.bracket_size || 0;
      var totalRounds = bracketSize > 0 ? Math.log2(bracketSize) : 0;

      var rNames = {};
      for (var r = 1; r <= totalRounds; r++) {
        if (r === totalRounds)         rNames[r] = 'Final';
        else if (r === totalRounds-1)  rNames[r] = 'Semi Finals';
        else if (r === totalRounds-2)  rNames[r] = 'Quarter Finals';
        else if (r === totalRounds-3)  rNames[r] = 'Round of 16';
        else                           rNames[r] = 'Round ' + r;
      }

      var logoHTML = organiser._clubLogo
        ? '<img src="' + organiser._clubLogo + '" alt="">'
        : '';

      var matchRows = '';
      var curRound = 0;
      matches.forEach(function(m) {
        if (m.round !== curRound) {
          curRound = m.round;
          matchRows += '<tr class="round-row"><td colspan="4">' + (rNames[m.round] || 'Round ' + m.round) + '</td></tr>';
        }
        if (m.status === 'bye') return;
        var p1 = m.player1 ? m.player1.first_name[0] + '. ' + m.player1.last_name : 'TBD';
        var p2 = m.player2 ? m.player2.first_name[0] + '. ' + m.player2.last_name : 'TBD';
        var result = m.status === 'completed'
          ? (m.winner ? m.winner.first_name[0] + '. ' + m.winner.last_name + (m.score ? ' (' + m.score + ')' : '') : '—')
          : (m.status === 'in_progress' ? 'In Progress' : '—');
        matchRows += '<tr><td>M' + m.position + '</td><td>' + p1 + '</td><td>' + p2 + '</td><td>' + result + '</td></tr>';
      });

      if (!matchRows) matchRows = '<tr><td colspan="4" style="text-align:center;color:#999;">Draw not generated yet</td></tr>';

      document.getElementById('printContent').innerHTML =
        '<div class="print-header">' +
          logoHTML +
          '<h1>' + name + '</h1>' +
          '<p>' + organiser._clubName + ' &bull; ' + bracketSize + ' Players &bull; Draw Sheet</p>' +
          '<p>Printed: ' + new Date().toLocaleDateString('en-IE', { day: 'numeric', month: 'long', year: 'numeric' }) + '</p>' +
        '</div>' +
        '<div class="print-section-title">Draw</div>' +
        '<table class="print-table">' +
          '<thead><tr><th>Match</th><th>Player 1</th><th>Player 2</th><th>Result</th></tr></thead>' +
          '<tbody>' + matchRows + '</tbody>' +
        '</table>' +
        '<div class="print-footer">Generated by MyMatchPlayPal</div>';
    }

    async function showNameList(tournamentId, name) {
      document.getElementById('printContent').innerHTML = '<p style="text-align:center;padding:2rem;color:#999;">Loading player list...</p>';
      document.getElementById('printPreview').style.display = 'block';
      document.body.style.overflow = 'hidden';

      var { data: entries } = await supabase
        .from('tournament_entries')
        .select('seed, members(first_name, last_name, handicap, phone, email)')
        .eq('tournament_id', tournamentId)
        .order('seed', { ascending: true });

      var logoHTML = organiser._clubLogo
        ? '<img src="' + organiser._clubLogo + '" alt="">'
        : '';

      var rows = (entries || []).map(function(e, i) {
        var m = e.members;
        return '<tr>' +
          '<td>' + (e.seed || (i + 1)) + '</td>' +
          '<td><strong>' + m.first_name + ' ' + m.last_name + '</strong></td>' +
          '<td>' + (m.handicap !== null ? m.handicap : '—') + '</td>' +
          '<td>' + (m.phone || '—') + '</td>' +
          '<td>' + (m.email || '—') + '</td>' +
        '</tr>';
      }).join('');

      if (!rows) rows = '<tr><td colspan="5" style="text-align:center;color:#999;">No entrants yet</td></tr>';

      document.getElementById('printContent').innerHTML =
        '<div class="print-header">' +
          logoHTML +
          '<h1>' + name + '</h1>' +
          '<p>' + organiser._clubName + ' &bull; Player List</p>' +
          '<p>Printed: ' + new Date().toLocaleDateString('en-IE', { day: 'numeric', month: 'long', year: 'numeric' }) + '</p>' +
        '</div>' +
        '<div class="print-section-title">Entrants (' + (entries ? entries.length : 0) + ')</div>' +
        '<table class="print-table">' +
          '<thead><tr><th>#</th><th>Name</th><th>Handicap</th><th>Phone</th><th>Email</th></tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
        '<div class="print-footer">Generated by MyMatchPlayPal</div>';
    }

    function closePreview() {
      document.getElementById('printPreview').style.display = 'none';
      document.body.style.overflow = '';
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
